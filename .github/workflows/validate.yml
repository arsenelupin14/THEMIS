name: Validate Themis Skill

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Validate skill
        run: python skills/themis/scripts/validate_themis_skill.py

      - name: Validate research mode
        run: python skills/themis/scripts/validate_research_mode.py

      - name: Validate public sample output
        run: python skills/themis/scripts/validate_public_output.py examples/research-solar-physics-v02/clean-final-sample.md

      - name: Validate claim ledger
        run: python skills/themis/scripts/validate_claim_ledger.py examples/research-solar-physics-v02/claim-ledger-sample.md

      - name: Validate retrieval contract
        run: python skills/themis/scripts/validate_retrieval_contract.py
